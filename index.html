<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKUEB Python Code Bank</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d0d0d;--paper:#f5f2eb;--paper2:#ede9df;--paper3:#e4dfd3;
  --code-bg:#1a1814;--code-bg2:#231f1a;--code-border:#3a3530;
  --green:#00c896;--green2:#00a87e;--amber:#e8a020;--red:#e05050;
  --blue:#5b9cf6;--purple:#b07ef8;--cyan:#4ecdc4;--pink:#f472b6;
  --comment:#6b6560;--keyword:#e8a020;--string:#00c896;--func:#5b9cf6;
  --num:#b07ef8;--op:#e05050;
  --accent:#e8a020;--accent2:#1a1814;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--paper);color:var(--ink);
  font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;
  min-height:100vh;
}

/* ── NOISE OVERLAY ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.4;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:var(--ink);color:var(--paper);
  padding:0 2rem;
  display:flex;align-items:stretch;justify-content:space-between;
  border-bottom:3px solid var(--accent);
  min-height:64px;
}
.hbrand{
  display:flex;align-items:center;gap:14px;
  border-right:1px solid rgba(255,255,255,0.1);
  padding-right:2rem;
}
.hbrand .logo{
  font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:0.05em;
  color:var(--accent);line-height:1;
}
.hbrand .sub{font-size:10px;color:rgba(255,255,255,0.4);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
.hstats{display:flex;align-items:center;gap:0;}
.hstat{
  padding:0 1.25rem;border-right:1px solid rgba(255,255,255,0.1);
  display:flex;flex-direction:column;justify-content:center;height:100%;
}
.hstat .n{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent);line-height:1;}
.hstat .l{font-size:9px;font-family:'IBM Plex Mono',monospace;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
.hsearch{
  padding:0 1.5rem;display:flex;align-items:center;gap:10px;
}
.hsearch input{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
  border-radius:5px;padding:7px 12px;color:var(--paper);
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  width:220px;outline:none;transition:border-color .2s;
}
.hsearch input::placeholder{color:rgba(255,255,255,0.3);}
.hsearch input:focus{border-color:var(--accent);}

/* ── LAYOUT ── */
.app{display:flex;height:calc(100vh - 67px);}

/* ── SIDEBAR ── */
aside{
  width:270px;flex-shrink:0;
  background:var(--paper2);
  border-right:2px solid var(--ink);
  overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--paper3) transparent;
}
.sb-section{border-bottom:1px solid var(--paper3);}
.sb-title{
  padding:10px 16px;
  font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:0.06em;
  background:var(--ink);color:var(--paper);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;
}
.sb-title .cnt{
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  background:var(--accent);color:var(--ink);
  padding:2px 6px;border-radius:3px;font-weight:600;
}
.sb-items{overflow:hidden;max-height:500px;transition:max-height .3s ease;}
.sb-items.collapsed{max-height:0;}
.sb-item{
  padding:8px 16px 8px 20px;cursor:pointer;
  transition:all .15s;border-left:3px solid transparent;
  display:flex;align-items:flex-start;gap:8px;
  font-size:12.5px;color:#444;
}
.sb-item:hover{background:var(--paper3);border-left-color:var(--paper3);}
.sb-item.on{background:#fff;border-left-color:var(--accent);color:var(--ink);}
.sb-item .ico{font-size:13px;flex-shrink:0;margin-top:1px;}
.sb-item .nm{line-height:1.35;}
.sb-item .tag{
  margin-left:auto;flex-shrink:0;font-size:9px;
  font-family:'IBM Plex Mono',monospace;
  background:var(--paper3);padding:1px 5px;border-radius:3px;color:#888;
  margin-top:2px;
}
.sb-item.on .tag{background:var(--ink);color:var(--paper);}

/* ── MAIN ── */
main{
  flex:1;overflow-y:auto;
  padding:2rem;
  scrollbar-width:thin;scrollbar-color:var(--paper3) transparent;
}

/* WELCOME */
.welcome{max-width:640px;margin:3rem auto;text-align:center;}
.welcome .big{
  font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:0.03em;
  line-height:1;color:var(--ink);margin-bottom:.5rem;
}
.welcome .big span{color:var(--accent);}
.welcome p{color:#666;font-size:14px;line-height:1.7;margin-bottom:1.5rem;}
.welcome-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:1.5rem;}
.wg-card{
  background:var(--ink);color:var(--paper);
  padding:14px;border-radius:6px;text-align:left;
  font-family:'IBM Plex Mono',monospace;
}
.wg-card .n{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);}
.wg-card .l{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}

/* TOPIC VIEW */
.topic-header{
  display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;
  margin-bottom:1.5rem;flex-wrap:wrap;
}
.topic-header h2{
  font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.03em;
}
.topic-header .desc{font-size:13px;color:#666;margin-top:3px;}
.th-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;}
.th-tag{
  font-size:10px;font-family:'IBM Plex Mono',monospace;
  padding:3px 8px;border-radius:3px;border:1px solid var(--paper3);color:#666;
}

/* CODE CARDS */
.code-section{margin-bottom:2.5rem;}
.section-label{
  font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:0.06em;
  color:var(--ink);margin-bottom:.85rem;
  padding-bottom:.4rem;border-bottom:2px solid var(--ink);
  display:flex;align-items:center;gap:10px;
}
.section-label .pill{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  padding:2px 7px;border-radius:3px;font-weight:600;font-style:normal;
}
.pill-xi{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
.pill-xii{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;}

.code-card{
  background:var(--code-bg);border:1px solid var(--code-border);
  border-radius:8px;margin-bottom:12px;
  overflow:hidden;font-family:'IBM Plex Mono',monospace;
  box-shadow:3px 3px 0 rgba(0,0,0,0.15);
  transition:transform .15s,box-shadow .15s;
}
.code-card:hover{transform:translateY(-1px);box-shadow:4px 5px 0 rgba(0,0,0,0.2);}

.card-header{
  padding:9px 14px;background:var(--code-bg2);
  border-bottom:1px solid var(--code-border);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.card-dots{display:flex;gap:5px;}
.dot{width:10px;height:10px;border-radius:50%;}
.dot-r{background:#e05050;}
.dot-y{background:#e8a020;}
.dot-g{background:#00c896;}
.card-title{
  font-size:11px;color:rgba(255,255,255,0.6);flex:1;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
}
.card-meta{display:flex;gap:6px;align-items:center;}
.cm-tag{
  font-size:9px;padding:2px 6px;border-radius:3px;
  background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.45);
}
.cm-tag.exam{background:rgba(232,160,32,0.18);color:var(--amber);}
.cm-tag.prac{background:rgba(0,200,150,0.15);color:var(--green);}
.copy-btn{
  font-size:9px;padding:3px 8px;border-radius:3px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.5);cursor:pointer;transition:all .15s;
}
.copy-btn:hover{background:var(--amber);color:var(--ink);border-color:var(--amber);}
.copy-btn.copied{background:var(--green);color:var(--ink);border-color:var(--green);}

.card-desc{
  padding:8px 14px;background:rgba(255,255,255,0.025);
  border-bottom:1px solid var(--code-border);
  font-size:11px;color:rgba(255,255,255,0.45);font-family:'DM Sans',sans-serif;
}

pre{
  padding:14px 16px;overflow-x:auto;font-size:12.5px;line-height:1.65;
  scrollbar-width:thin;scrollbar-color:#3a3530 transparent;
  margin:0;
}
.cm{color:#6b6560;}
.kw{color:#e8a020;font-weight:500;}
.st{color:#00c896;}
.fn{color:#5b9cf6;}
.nm{color:#b07ef8;}
.op{color:#e05050;}
.bi{color:#4ecdc4;}
.cn{color:#f472b6;}
.hl{background:rgba(232,160,32,0.1);display:inline-block;width:100%;}

/* SEARCH VIEW */
.sr-header{
  font-family:'Bebas Neue',sans-serif;font-size:1.5rem;
  margin-bottom:1.5rem;padding-bottom:.5rem;
  border-bottom:2px solid var(--ink);
}
.sr-card{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px;background:var(--paper2);border:1px solid var(--paper3);
  border-radius:6px;margin-bottom:10px;cursor:pointer;transition:all .15s;
}
.sr-card:hover{background:#fff;border-color:var(--ink);}
.sr-badge{
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  padding:3px 7px;border-radius:3px;background:var(--ink);color:var(--paper);
  flex-shrink:0;margin-top:2px;
}
.sr-title{font-size:13px;font-weight:500;}
.sr-sub{font-size:11px;color:#888;margin-top:2px;font-family:'IBM Plex Mono',monospace;}

.hidden{display:none!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--paper3);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div class="hbrand">
    <div>
      <div class="logo">AKUEB Python</div>
      <div class="sub">HSSC-1 &amp; HSSC-2 Code Reference</div>
    </div>
  </div>
  <div class="hstats">
    <div class="hstat"><div class="n" id="st-topics">14</div><div class="l">Topics</div></div>
    <div class="hstat"><div class="n" id="st-codes">0</div><div class="l">Code Examples</div></div>
  </div>
  <div class="hsearch">
    <input type="text" placeholder="Search programs…" id="searchBox" oninput="doSearch(this.value)">
  </div>
</header>

<div class="app">
<aside id="sidebar"></aside>
<main id="main">

<div class="welcome" id="welcomeScreen">
  <div class="big">Python<br><span>Code Bank</span></div>
  <p>Every type of Python program that can be asked in your AKUEB HSSC examination — mapped to SLOs from Topics 3 &amp; 10 of the syllabus. Select a category from the sidebar to explore.</p>
  <div class="welcome-grid" id="welcomeGrid"></div>
</div>

<div id="topicView" class="hidden"></div>
<div id="searchView" class="hidden"></div>
</main>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA  — every code category with full examples
// ─────────────────────────────────────────────────────────────────────────────
const CATS = [
  // ── GRADE XI ──────────────────────────────────────────────────────────────
  {
    id:"comments", grade:"XI", icon:"💬", title:"Comments & Program Structure",
    slo:"3.1.7–3.1.8", desc:"Single-line and multi-line comments; program headers.",
    codes:[
      { title:"Single-line and multi-line comments", tags:["Practical","CRQ"],
        desc:"Write a program using both comment types to explain each section.",
        code:`<span class="cm"># Single-line comment — describes the next line</span>
<span class="kw">print</span>(<span class="st">"Hello, AKUEB!"</span>)

<span class="cm">"""
Multi-line comment (docstring).
This program demonstrates both comment types.
Author: Ali Saad
"""</span>

<span class="cn">name</span> = <span class="st">"Python"</span>      <span class="cm"># variable assignment</span>
<span class="kw">print</span>(<span class="cn">name</span>)` },
    ]
  },
  {
    id:"datatypes", grade:"XI", icon:"📦", title:"Data Types & Variables",
    slo:"3.4.1–3.4.5", desc:"int, float, str, bool; local/global; type casting; valid names.",
    codes:[
      { title:"Demonstrate all five data types", tags:["Practical","MCQ"],
        desc:"Declare variables of each type and print using type().",
        code:`<span class="cn">age</span>     = <span class="nm">17</span>          <span class="cm"># int</span>
<span class="cn">gpa</span>     = <span class="nm">3.85</span>        <span class="cm"># float</span>
<span class="cn">name</span>    = <span class="st">"Ali Saad"</span>  <span class="cm"># str</span>
<span class="cn">passed</span>  = <span class="kw">True</span>        <span class="cm"># bool</span>
<span class="cn">initial</span> = <span class="st">'A'</span>         <span class="cm"># char (str of length 1)</span>

<span class="kw">for</span> <span class="cn">var</span> <span class="kw">in</span> [<span class="cn">age</span>, <span class="cn">gpa</span>, <span class="cn">name</span>, <span class="cn">passed</span>, <span class="cn">initial</span>]:
    <span class="kw">print</span>(<span class="fn">type</span>(<span class="cn">var</span>), <span class="st">"→"</span>, <span class="cn">var</span>)` },
      { title:"Local vs Global variables", tags:["CRQ","ERQ"],
        desc:"Demonstrate scope difference using global keyword.",
        code:`<span class="cn">score</span> = <span class="nm">100</span>          <span class="cm"># global variable</span>

<span class="kw">def</span> <span class="fn">update</span>():
    <span class="kw">global</span> <span class="cn">score</span>
    <span class="cn">local_bonus</span> = <span class="nm">10</span>  <span class="cm"># local variable</span>
    <span class="cn">score</span> += <span class="cn">local_bonus</span>
    <span class="kw">print</span>(<span class="st">"Inside function — score:"</span>, <span class="cn">score</span>)

<span class="fn">update</span>()
<span class="kw">print</span>(<span class="st">"Outside function — score:"</span>, <span class="cn">score</span>)` },
      { title:"Implicit and explicit type casting", tags:["Practical","CRQ"],
        desc:"Show automatic and manual type conversion.",
        code:`<span class="cm"># Implicit casting</span>
<span class="cn">x</span> = <span class="nm">5</span>          <span class="cm"># int</span>
<span class="cn">y</span> = <span class="nm">2.0</span>        <span class="cm"># float</span>
<span class="cn">z</span> = <span class="cn">x</span> + <span class="cn">y</span>      <span class="cm"># Python auto-converts x to float</span>
<span class="kw">print</span>(<span class="fn">type</span>(<span class="cn">z</span>), <span class="cn">z</span>)   <span class="cm"># float 7.0</span>

<span class="cm"># Explicit casting</span>
<span class="cn">num_str</span> = <span class="st">"42"</span>
<span class="cn">num_int</span> = <span class="fn">int</span>(<span class="cn">num_str</span>)   <span class="cm"># str → int</span>
<span class="cn">num_flt</span> = <span class="fn">float</span>(<span class="cn">num_str</span>) <span class="cm"># str → float</span>
<span class="kw">print</span>(<span class="cn">num_int</span> + <span class="nm">8</span>)       <span class="cm"># 50</span>` },
    ]
  },
  {
    id:"io", grade:"XI", icon:"⌨️", title:"Input / Output & eval()",
    slo:"3.5.1–3.5.4", desc:"input(), print(), eval() for user interaction.",
    codes:[
      { title:"Basic input and output", tags:["Practical","MCQ"],
        desc:"Take name and age from user and display formatted output.",
        code:`<span class="cn">name</span> = <span class="fn">input</span>(<span class="st">"Enter your name: "</span>)
<span class="cn">age</span>  = <span class="fn">int</span>(<span class="fn">input</span>(<span class="st">"Enter your age: "</span>))

<span class="kw">print</span>(<span class="st">"Hello,"</span>, <span class="cn">name</span> + <span class="st">"!"</span>)
<span class="kw">print</span>(<span class="st">f"You are </span><span class="nm">{<span class="cn">age</span>}</span><span class="st"> years old."</span>)
<span class="kw">print</span>(<span class="st">"Next year you will be"</span>, <span class="cn">age</span> + <span class="nm">1</span>)` },
      { title:"Using eval() to evaluate expressions", tags:["Practical","CRQ"],
        desc:"eval() converts a string to a Python expression and evaluates it.",
        code:`<span class="cm"># eval() evaluates a string as a Python expression</span>
<span class="cn">expr</span> = <span class="fn">input</span>(<span class="st">"Enter a math expression: "</span>)
<span class="cn">result</span> = <span class="fn">eval</span>(<span class="cn">expr</span>)
<span class="kw">print</span>(<span class="st">"Result:"</span>, <span class="cn">result</span>)

<span class="cm"># Example: user types  3 * (4 + 2)  → result = 18</span>

<span class="cm"># eval with two inputs</span>
<span class="cn">a</span>, <span class="cn">b</span> = <span class="fn">eval</span>(<span class="fn">input</span>(<span class="st">"Enter two numbers (comma-separated): "</span>))
<span class="kw">print</span>(<span class="st">"Sum:"</span>, <span class="cn">a</span> + <span class="cn">b</span>)` },
    ]
  },
  {
    id:"operators", grade:"XI", icon:"➕", title:"Operators",
    slo:"3.6.1–3.6.3", desc:"Arithmetic, bitwise, comparison, logical operators.",
    codes:[
      { title:"All arithmetic operators", tags:["Practical","MCQ"],
        desc:"Demonstrate +, -, *, /, //, %, ** with labelled output.",
        code:`<span class="cn">a</span>, <span class="cn">b</span> = <span class="fn">int</span>(<span class="fn">input</span>(<span class="st">"a: "</span>)), <span class="fn">int</span>(<span class="fn">input</span>(<span class="st">"b: "</span>))

<span class="kw">print</span>(<span class="st">f"Addition:       </span><span class="nm">{<span class="cn">a</span>}</span><span class="st"> + </span><span class="nm">{<span class="cn">b</span>}</span><span class="st"> = </span><span class="nm">{<span class="cn">a</span>+<span class="cn">b</span>}</span><span class="st">"</span>)
<span class="kw">print</span>(<span class="st">f"Subtraction:    </span><span class="nm">{<span class="cn">a</span>}</span><span class="st"> - </span><span class="nm">{<span class="cn">b</span>}</span><span class="st"> = </span><span class="nm">{<span class="cn">a</span>-<span class="cn">b</span>}</span><span class="st">"</span>)
<span class="kw">print</span>(<span class="st">f"Multiplication: </span><span class="nm">{<span class="cn">a</span>}</span><span class="st"> * </span><span class="nm">{<span class="cn">b</span>}</span><span class="st"> = </span><span class="nm">{<span class="cn">a</span>*<span class="cn">b</span>}</span><span class="st">"</span>)
<span class="kw">print</span>(<span class="st">f"Division:       </span><span class="nm">{<span class="cn">a</span>}</span><span class="st"> / </span><span class="nm">{<span class="cn">b</span>}</span><span class="st"> = </span><span class="nm">{<span class="cn">a</span>/<span class="cn">b</span>:.2f}</span><span class="st">"</span>)
<span class="kw">print</span>(<span class="st">f"Floor Div:      </span><span class="nm">{<span class="cn">a</span>}</span><span class="st"> // </span><span class="nm">{<span class="cn">b</span>}</span><span class="st"> = </span><span class="nm">{<span class="cn">a</span>//<span class="cn">b</span>}</span><span class="st">"</span>)
<span class="kw">print</span>(<span class="st">f"Modulus:        </span><span class="nm">{<span class="cn">a</span>}</span><span class="st"> % </span><span class="nm">{<span class="cn">b</span>}</span><span class="st"> = </span><span class="nm">{<span class="cn">a</span>%<span class="cn">b</span>}</span><span class="st">"</span>)
<span class="kw">print</span>(<span class="st">f"Exponent:       </span><span class="nm">{<span class="cn">a</span>}</span><span class="st"> ** </span><span class="nm">{<span class="cn">b</span>}</span><span class="st"> = </span><span class="nm">{<span class="cn">a</span>**<span class="cn">b</span>}</span><span class="st">"</span>)` },
      { title:"Bitwise operators", tags:["Practical","MCQ"],
        desc:"AND, OR, XOR, NOT, left-shift, right-shift on integers.",
        code:`<span class="cn">a</span>, <span class="cn">b</span> = <span class="nm">12</span>, <span class="nm">10</span>    <span class="cm"># 1100, 1010 in binary</span>

<span class="kw">print</span>(<span class="st">f"a &amp; b  (AND)    = </span><span class="nm">{<span class="cn">a</span> &amp; <span class="cn">b</span>}</span><span class="st">"</span>)   <span class="cm"># 1000 = 8</span>
<span class="kw">print</span>(<span class="st">f"a | b  (OR)     = </span><span class="nm">{<span class="cn">a</span> | <span class="cn">b</span>}</span><span class="st">"</span>)   <span class="cm"># 1110 = 14</span>

// ─────────────────────────────────────────────────────────────────────────────
// BUILD UI
// ─────────────────────────────────────────────────────────────────────────────
let activeCat = null;
let totalCodes = 0;

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let xiHTML = '', xiiHTML = '';
  let xiCount = 0, xiiCount = 0;

  CATS.forEach(cat => {
    const cnt = cat.codes.length;
    totalCodes += cnt;
    const item = `<div class="sb-item" data-id="${cat.id}" onclick="showCat('${cat.id}')">
      <span class="ico">${cat.icon}</span>
      <span class="nm">${cat.title}</span>
      <span class="tag">${cnt}</span>
    </div>`;
    if (cat.grade === 'XI') { xiHTML += item; xiCount += cnt; }
    else { xiiHTML += item; xiiCount += cnt; }
  });

  sb.innerHTML = `
    <div class="sb-section">
      <div class="sb-title" onclick="toggleSection(this)">
        <span>◆ Grade XI — Part I</span><span class="cnt">${xiCount}</span>
      </div>
      <div class="sb-items">${xiHTML}</div>
    </div>
    <div class="sb-section">
      <div class="sb-title" onclick="toggleSection(this)">
        <span>◆ Grade XII — Part II</span><span class="cnt">${xiiCount}</span>
      </div>
      <div class="sb-items">${xiiHTML}</div>
    </div>`;

  document.getElementById('st-codes').textContent = totalCodes;
}

function buildWelcome() {
  const grid = document.getElementById('welcomeGrid');
  const stats = [
    {n: CATS.filter(c=>c.grade==='XI').length,  l:'Grade XI Topics'},
    {n: CATS.filter(c=>c.grade==='XII').length, l:'Grade XII Topics'},
    {n: totalCodes, l:'Code Examples'},
    {n: CATS.reduce((a,c)=>a+c.codes.filter(x=>x.tags.includes('ERQ')).length,0), l:'ERQ Programs'},
    {n: CATS.reduce((a,c)=>a+c.codes.filter(x=>x.tags.includes('Practical')).length,0), l:'Practicals'},
    {n: CATS.reduce((a,c)=>a+c.codes.filter(x=>x.tags.includes('MCQ')).length,0), l:'MCQ Programs'},
  ];
  grid.innerHTML = stats.map(s=>`<div class="wg-card"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join('');
}

function toggleSection(el) {
  el.nextElementSibling.classList.toggle('collapsed');
}

function showCat(id) {
  activeCat = id;
  const cat = CATS.find(c=>c.id===id);
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('on', el.dataset.id===id));
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('searchView').classList.add('hidden');
  const tv = document.getElementById('topicView');
  tv.classList.remove('hidden');

  const gradePill = cat.grade==='XI'
    ? `<span class="pill pill-xi">Grade XI</span>`
    : `<span class="pill pill-xii">Grade XII</span>`;

  const tagSet = new Set(cat.codes.flatMap(c=>c.tags));
  const tagPills = [...tagSet].map(t=>`<span class="th-tag">${t}</span>`).join('');

  let html = `<div class="topic-header">
    <div>
      <h2>${cat.icon} ${cat.title}</h2>
      <div class="desc">SLO ${cat.slo} &nbsp;·&nbsp; ${cat.desc}</div>
      <div class="th-tags">${gradePill} <span class="th-tag">${cat.codes.length} programs</span> ${tagPills}</div>
    </div>
  </div>`;

  // group by tag
  const allTags = ['Practical','ERQ','CRQ','MCQ'];
  const shown = new Set();
  allTags.forEach(tag => {
    const relevant = cat.codes.filter(c=>c.tags.includes(tag));
    if(!relevant.length) return;
    const displayTag = tag==='Practical'?'Practical / Lab Programs':tag==='ERQ'?'Extended Response (ERQ) Programs':tag==='CRQ'?'Constructed Response (CRQ) Programs':'MCQ-Style Programs';
    const pillClass = tag==='Practical'?'prac':'exam';
    html += `<div class="code-section">
      <div class="section-label">${displayTag} <span class="pill ${pillClass}">${tag}</span></div>`;
    relevant.forEach(code => {
      if(shown.has(code.title)) return;
      shown.add(code.title);
      const tagBadges = code.tags.map(t=>`<span class="cm-tag ${t==='Practical'?'prac':t==='ERQ'||t==='CRQ'?'exam':''}">${t}</span>`).join('');
      html += `<div class="code-card">
        <div class="card-header">
          <div class="card-dots"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div></div>
          <div class="card-title">${code.title}</div>
          <div class="card-meta">${tagBadges}</div>
          <button class="copy-btn" onclick="copyCode(this)">copy</button>
        </div>
        <div class="card-desc">${code.desc}</div>
        <pre>${code.code}</pre>
      </div>`;
    });
    html += `</div>`;
  });

  tv.innerHTML = html;
  tv.scrollTop = 0;
}

function copyCode(btn) {
  const pre = btn.closest('.code-card').querySelector('pre');
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='copied!';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='copy';btn.classList.remove('copied');},2000);
  });
}

function doSearch(val) {
  const q = val.trim().toLowerCase();
  if(!q){
    document.getElementById('searchView').classList.add('hidden');
    if(activeCat) document.getElementById('topicView').classList.remove('hidden');
    else document.getElementById('welcomeScreen').classList.remove('hidden');
    return;
  }
  document.getElementById('topicView').classList.add('hidden');
  document.getElementById('welcomeScreen').classList.add('hidden');
  const sv = document.getElementById('searchView');
  sv.classList.remove('hidden');

  let results = [];
  CATS.forEach(cat=>{
    cat.codes.forEach(code=>{
      if(code.title.toLowerCase().includes(q)||code.desc.toLowerCase().includes(q)||cat.title.toLowerCase().includes(q)){
        results.push({code,cat});
      }
    });
  });

  if(!results.length){ sv.innerHTML=`<div style="color:#888;padding:3rem;text-align:center;font-family:'IBM Plex Mono',monospace;">No results for "${val}"</div>`; return; }

  sv.innerHTML = `<div class="sr-header">Search: "${val}" — ${results.length} results</div>` +
    results.map(({code,cat})=>`
      <div class="sr-card" onclick="showCatAndScroll('${cat.id}','${code.title}')">
        <span class="sr-badge">${cat.icon} ${cat.grade}</span>
        <div>
          <div class="sr-title">${code.title}</div>
          <div class="sr-sub">${cat.title} · ${code.tags.join(' · ')}</div>
        </div>
      </div>`).join('');
}

function showCatAndScroll(catId) {
  showCat(catId);
}

buildSidebar();
buildWelcome();
</script>
